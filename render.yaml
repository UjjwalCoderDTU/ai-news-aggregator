services:
  - type: cron
    name: ai-news-aggregator-daily
    runtime: python
    plan: standard

    buildCommand: |
      pip install uv
      uv sync --frozen --no-cache

    startCommand: uv run python main.py all --hours 24 || echo "Job failed"

    schedule: "30 18 * * *"

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

      - key: OPENAI_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "5432"

      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENT
        sync: false
      - key: EMAIL_HOURS
        value: "24"