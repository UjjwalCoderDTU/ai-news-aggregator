services:
  - type: cron
    name: ai-news-aggregator-daily
    runtime: python
    plan: standard

    buildCommand: |
      pip install uv
      uv sync --frozen

    startCommand: uv run python main.py all --hours 24

    # 12:00 AM IST = 18:30 UTC (previous day)
    # Cron format: minute hour day month day-of-week
    schedule: "30 18 * * *"

    # Environment variables - configure these in Render dashboard
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENT
        sync: false
      - key: EMAIL_HOURS
        value: "24"

    # Optional: Set up notifications
    notifications:
      enabled: true
      type: email  # Receive email on failure
